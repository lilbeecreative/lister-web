<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lister AI</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c10; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:32px 24px 80px; }
  .container { max-width:1100px; margin:0 auto; }
  .header { margin-bottom:40px; display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:28px; font-weight:800; }
  .header p { color:#64748b; font-size:13px; margin-top:4px; }
  .badge { display:inline-block; background:#22c55e; color:#000; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:8px; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
  .stat-card { background:#111318; border:1px solid #1e2330; border-radius:12px; padding:20px; }
  .stat-card .val { font-size:32px; font-weight:800; }
  .stat-card .lbl { font-size:12px; color:#64748b; margin-top:4px; }
  .stat-card.green .val { color:#22c55e; }
  .stat-card.blue .val { color:#3b82f6; }
  .stat-card.amber .val { color:#f59e0b; }
  .section-title { font-size:13px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; background:#111318; border:1px solid #1e2330; border-radius:12px; overflow:hidden; }
  th { background:#161b28; padding:12px 16px; text-align:left; font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
  td { padding:14px 16px; font-size:13px; border-top:1px solid #1e2330; }
  tr:hover td { background:#161b28; }
  .pill { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill.active { background:rgba(34,197,94,0.15); color:#22c55e; }
  .pill.inactive { background:rgba(100,116,139,0.15); color:#64748b; }
  .empty { text-align:center; padding:48px; color:#64748b; }
  .refresh { background:#1e2535; border:1px solid #2d3348; color:#94a3b8; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
  .refresh:hover { background:#2d3348; }
  .search { background:#111318; border:1px solid #1e2330; border-radius:8px; padding:10px 14px; color:#f1f5f9; font-size:13px; width:280px; outline:none; }
  .search:focus { border-color:#22c55e; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:16px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Admin Dashboard <span class="badge">Internal</span></h1>
      <p>Precision Industrial LLC — Lister AI user management</p>
    </div>
    <button class="refresh" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="stats-row">
    <div class="stat-card green"><div class="val" id="stat-businesses">—</div><div class="lbl">Total Businesses</div></div>
    <div class="stat-card blue"><div class="val" id="stat-listings">—</div><div class="lbl">Total Listings</div></div>
    <div class="stat-card amber"><div class="val" id="stat-scans">—</div><div class="lbl">Total Auction Scans</div></div>
    <div class="stat-card"><div class="val" id="stat-active">—</div><div class="lbl">Active This Week</div></div>
  </div>

  <div class="toolbar">
    <div class="section-title" style="margin:0;flex:1;">Registered Businesses</div>
    <input class="search" type="text" placeholder="Search businesses..." oninput="filterTable(this.value)">
  </div>

  <table id="biz-table">
    <thead>
      <tr>
        <th>Business</th>
        <th>Email</th>
        <th>Listings</th>
        <th>Scans</th>
        <th>Joined</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="biz-tbody">
      <tr><td colspan="6" class="empty">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function loadData() {
  try {
    const r = await fetch('/api/admin/businesses');
    const data = await r.json();
    
    const businesses = data.businesses || [];
    document.getElementById('stat-businesses').textContent = businesses.length;
    document.getElementById('stat-listings').textContent = businesses.reduce((a,b) => a + (b.listing_count||0), 0);
    document.getElementById('stat-scans').textContent = businesses.reduce((a,b) => a + (b.scan_count||0), 0);
    
    const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const active = businesses.filter(b => b.last_active && new Date(b.last_active).getTime() > oneWeekAgo).length;
    document.getElementById('stat-active').textContent = active;

    const tbody = document.getElementById('biz-tbody');
    if (!businesses.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No businesses registered yet</td></tr>';
      return;
    }
    tbody.innerHTML = businesses.map(b => {
      const joined = b.created_at ? new Date(b.created_at).toLocaleDateString() : '—';
      const lastActive = b.last_active ? new Date(b.last_active).toLocaleDateString() : 'Never';
      const isActive = b.last_active && new Date(b.last_active).getTime() > oneWeekAgo;
      return `<tr>
        <td><strong>${esc(b.name)}</strong></td>
        <td style="color:#64748b;">${esc(b.email)}</td>
        <td>${b.listing_count || 0}</td>
        <td>${b.scan_count || 0}</td>
        <td style="color:#64748b;">${joined}</td>
        <td><span class="pill ${isActive ? 'active' : 'inactive'}">${isActive ? 'Active' : 'Inactive'}</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    document.getElementById('biz-tbody').innerHTML = '<tr><td colspan="6" class="empty">Error loading data</td></tr>';
  }
}

function filterTable(q) {
  const rows = document.querySelectorAll('#biz-tbody tr');
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
