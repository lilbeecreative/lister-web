<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Lister AI</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0c10; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:32px 24px 80px; }
  .container { max-width:1100px; margin:0 auto; }
  .header { margin-bottom:40px; display:flex; justify-content:space-between; align-items:center; }
  .header h1 { font-size:28px; font-weight:800; }
  .header p { color:#64748b; font-size:13px; margin-top:4px; }
  .badge { display:inline-block; background:#22c55e; color:#000; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:8px; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:32px; }
  .stat-card { background:#111318; border:1px solid #1e2330; border-radius:12px; padding:20px; }
  .stat-card .val { font-size:32px; font-weight:800; }
  .stat-card .lbl { font-size:12px; color:#64748b; margin-top:4px; }
  .stat-card.green .val { color:#22c55e; }
  .stat-card.blue .val { color:#3b82f6; }
  .stat-card.amber .val { color:#f59e0b; }
  .section-title { font-size:13px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; background:#111318; border:1px solid #1e2330; border-radius:12px; overflow:hidden; }
  th { background:#161b28; padding:12px 16px; text-align:left; font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
  td { padding:12px 16px; font-size:13px; border-top:1px solid #1e2330; vertical-align:middle; }
  tr:hover td { background:#161b28; }
  .pill { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill.active { background:rgba(34,197,94,0.15); color:#22c55e; }
  .pill.inactive { background:rgba(100,116,139,0.15); color:#64748b; }
  .pill.limited { background:rgba(239,68,68,0.15); color:#ef4444; }
  .empty { text-align:center; padding:48px; color:#64748b; }
  .btn-sm { padding:5px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:none; }
  .btn-green { background:rgba(34,197,94,0.15); color:#22c55e; }
  .btn-green:hover { background:rgba(34,197,94,0.25); }
  .btn-red { background:rgba(239,68,68,0.15); color:#ef4444; }
  .btn-red:hover { background:rgba(239,68,68,0.25); }
  .btn-blue { background:rgba(59,130,246,0.15); color:#3b82f6; }
  .btn-blue:hover { background:rgba(59,130,246,0.25); }
  .search { background:#111318; border:1px solid #1e2330; border-radius:8px; padding:10px 14px; color:#f1f5f9; font-size:13px; width:280px; outline:none; }
  .search:focus { border-color:#22c55e; }
  .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:16px; }
  .refresh { background:#1e2535; border:1px solid #2d3348; color:#94a3b8; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; }
  .scan-bar { display:flex; align-items:center; gap:8px; }
  .scan-track { flex:1; height:6px; background:#1e2330; border-radius:3px; min-width:60px; }
  .scan-fill { height:100%; border-radius:3px; background:#22c55e; transition:width 0.3s; }
  .scan-fill.warn { background:#f59e0b; }
  .scan-fill.full { background:#ef4444; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#111318; border:1px solid #1e2330; border-radius:16px; padding:32px; width:100%; max-width:400px; }
  .modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; color:#64748b; margin-bottom:6px; font-weight:600; text-transform:uppercase; }
  .field input { width:100%; background:#0f1117; border:1px solid #1e2330; border-radius:8px; padding:10px 12px; color:#f1f5f9; font-size:14px; outline:none; }
  .field input:focus { border-color:#22c55e; }
  .modal-btns { display:flex; gap:10px; margin-top:20px; }
  .btn-full { flex:1; padding:11px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; border:none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Admin Dashboard <span class="badge">Internal</span></h1>
      <p>Precision Industrial LLC — Lister AI user management</p>
    </div>
    <button class="refresh" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="stats-row">
    <div class="stat-card green"><div class="val" id="stat-businesses">—</div><div class="lbl">Total Businesses</div></div>
    <div class="stat-card blue"><div class="val" id="stat-listings">—</div><div class="lbl">Total Listings</div></div>
    <div class="stat-card amber"><div class="val" id="stat-scans">—</div><div class="lbl">Total Scans Used</div></div>
    <div class="stat-card"><div class="val" id="stat-active">—</div><div class="lbl">Active This Week</div></div>
  </div>

  <div class="toolbar">
    <div class="section-title" style="margin:0;flex:1;">Registered Businesses</div>
    <input class="search" type="text" placeholder="Search businesses..." oninput="filterTable(this.value)">
  </div>

  <table id="biz-table">
    <thead>
      <tr>
        <th>Business</th>
        <th>Email</th>
        <th>Listings</th>
        <th>Scans Used</th>
        <th>Joined</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="biz-tbody">
      <tr><td colspan="7" class="empty">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Edit Business</h2>
    <div id="edit-biz-name" style="color:#64748b;font-size:13px;margin-bottom:16px;"></div>
    <div class="field">
      <label>Scan Limit</label>
      <input type="number" id="edit-scan-limit" min="0" max="10000">
    </div>
    <div class="field">
      <label>Scans Used (reset to 0 to restart trial)</label>
      <input type="number" id="edit-scan-count" min="0">
    </div>
    <div class="modal-btns">
      <button class="btn-full" style="background:#1e2535;color:#94a3b8;" onclick="closeModal()">Cancel</button>
      <button class="btn-full" style="background:#22c55e;color:#000;" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let allBusinesses = [];
let editingId = null;

async function loadData() {
  try {
    const r = await fetch('/api/admin/businesses');
    const data = await r.json();
    allBusinesses = data.businesses || [];

    document.getElementById('stat-businesses').textContent = allBusinesses.length;
    document.getElementById('stat-listings').textContent = allBusinesses.reduce((a,b) => a + (b.listing_count||0), 0);
    document.getElementById('stat-scans').textContent = allBusinesses.reduce((a,b) => a + (b.scan_count||0), 0);

    const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const active = allBusinesses.filter(b => b.last_active && new Date(b.last_active).getTime() > oneWeekAgo).length;
    document.getElementById('stat-active').textContent = active;

    renderTable(allBusinesses);
  } catch(e) {
    document.getElementById('biz-tbody').innerHTML = '<tr><td colspan="7" class="empty">Error loading data</td></tr>';
  }
}

function renderTable(businesses) {
  const tbody = document.getElementById('biz-tbody');
  if (!businesses.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No businesses registered yet</td></tr>';
    return;
  }
  const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  tbody.innerHTML = businesses.map(b => {
    const joined = b.created_at ? new Date(b.created_at).toLocaleDateString() : '—';
    const isActive = b.last_active && new Date(b.last_active).getTime() > oneWeekAgo;
    const scanCount = b.scan_count || 0;
    const scanLimit = b.scan_limit || 50;
    const scanPct = Math.min(100, Math.round(scanCount / scanLimit * 100));
    const fillClass = scanPct >= 100 ? 'full' : scanPct >= 80 ? 'warn' : '';
    const statusPill = scanPct >= 100 
      ? '<span class="pill limited">Limit Reached</span>'
      : isActive ? '<span class="pill active">Active</span>' : '<span class="pill inactive">Inactive</span>';
    return `<tr>
      <td><strong>${esc(b.name)}</strong>${b.is_admin ? ' <span style="font-size:10px;color:#f59e0b;">★ Admin</span>' : ''}</td>
      <td style="color:#64748b;">${esc(b.email)}</td>
      <td>${b.listing_count || 0}</td>
      <td>
        <div class="scan-bar">
          <span style="font-size:12px;min-width:55px;">${scanCount} / ${scanLimit}</span>
          <div class="scan-track"><div class="scan-fill ${fillClass}" style="width:${scanPct}%"></div></div>
        </div>
      </td>
      <td style="color:#64748b;">${joined}</td>
      <td>${statusPill}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn-sm btn-blue" onclick="editBusiness('${b.id}')">✏️ Edit</button>
          <button class="btn-sm btn-green" onclick="resetScans('${b.id}', '${esc(b.name)}')">↺ Reset</button>
          <button class="btn-sm btn-red" onclick="deleteBusiness('${b.id}', '${esc(b.name)}')">✕ Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable(q) {
  const filtered = allBusinesses.filter(b => 
    (b.name||'').toLowerCase().includes(q.toLowerCase()) || 
    (b.email||'').toLowerCase().includes(q.toLowerCase())
  );
  renderTable(filtered);
}

function editBusiness(id) {
  const b = allBusinesses.find(x => x.id === id);
  if (!b) return;
  editingId = id;
  document.getElementById('edit-biz-name').textContent = b.name + ' — ' + b.email;
  document.getElementById('edit-scan-limit').value = b.scan_limit || 50;
  document.getElementById('edit-scan-count').value = b.scan_count || 0;
  document.getElementById('edit-modal').classList.add('open');
}

async function saveEdit() {
  if (!editingId) return;
  const scan_limit = parseInt(document.getElementById('edit-scan-limit').value) || 50;
  const scan_count = parseInt(document.getElementById('edit-scan-count').value) || 0;
  try {
    await fetch(`/api/admin/businesses/${editingId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({scan_limit, scan_count})
    });
    closeModal();
    loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function resetScans(id, name) {
  if (!confirm(`Reset scan count to 0 for "${name}"?`)) return;
  await fetch(`/api/admin/businesses/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({scan_count: 0})
  });
  loadData();
}

async function deleteBusiness(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  await fetch(`/api/admin/businesses/${id}`, {method: 'DELETE'});
  loadData();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('edit-modal')) return;
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
